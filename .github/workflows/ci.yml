name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  traceability:
    name: Traceability (schema + acyclic graph + fresh reports)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - name: Validate claims + check dependency graph is acyclic
        run: python3 traceability/scripts/build.py
      - name: Generated reports must be fresh (no stale commits)
        run: |
          if ! git diff --quiet traceability/generated; then
            echo "::error::traceability/generated is stale — run build.py and commit the result"
            git diff --stat traceability/generated
            exit 1
          fi

  lean-core:
    name: Lean core typecheck (Mathlib-free)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install elan + Lean (pinned by lean-toolchain)
        run: |
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -o elan-init.sh
          bash elan-init.sh -y --default-toolchain "$(cat formalization/lean-toolchain)"
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Typecheck Core/Primitives.lean (no Mathlib, must have 0 sorry)
        working-directory: formalization
        run: lean TrtFormalization/Core/Primitives.lean

  math-lint:
    name: GitHub-safe LaTeX (no \operatorname in committed math)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reject \operatorname in markdown math
        run: |
          # Exclude the vendored LRT sub-project and backtick-wrapped documentation
          # mentions (e.g. the rule in research-practices.md). Real math lines have no backtick.
          HITS=$(grep -rn '\\operatorname' --include='*.md' . | grep -v '/lrt/' | grep -v '`' || true)
          if [ -n "$HITS" ]; then
            echo "::error::\\operatorname found in math — use \\mathrm (see issue #7 / 0-program-methods/research-practices.md)"
            echo "$HITS"
            exit 1
          fi
          echo "OK — no \\operatorname in committed math"
