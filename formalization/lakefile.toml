name = "trt-formalization"
version = "0.1.0"
keywords = ["logic", "physics", "foundations"]
defaultTargets = ["TrtFormalization"]

[leanOptions]
pp.unicode.fun = true
relaxedAutoImplicit = false

# Mathlib is required for the belt derivations and the imported LRT core.
# The Core/ primitives are Mathlib-free and typecheck standalone.
[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.28.0"

[[lean_lib]]
name = "TrtFormalization"
