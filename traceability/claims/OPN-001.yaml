id: OPN-001
name: Formalize Co-Admissibility (Task 0.1)
statement: |
  Define co-admissibility as a criterion C(constraints) → admissible set that is
  well-defined, computable, and measure-independent (no free entanglement measure).
tier: 2
role: open
proof_status: prose_only
epistemic_status: open
depends_on:
  - { claim_id: ONT-002, dependency_type: logical }
source_documents:
  - { doc: TRT-v0.9, section: "6.6, 13.1" }
  - { doc: ROADMAP, section: "Tier 0 / 0.1" }
  - { doc: TRT-co-admissibility-formalization, section: "Attempt 1 (C0); Attempt 2 (computation)" }
formal_artifacts:
  computation:
    - notebook: "3-prediction/co-admissibility-conjecture/code/coadmissibility_commutant.py"
      result: |
        Reproduces (deterministic, no fitted params) on the verified Feller et al. 2020
        model, Eqs.(3)-(4). The rate-INDEPENDENT measure-free criteria are non-discriminating:
        (i) commutant {a,a†,N,H}' = C·Id (dim 1, N=8..64) -> no DFS; (ii) Fock/coherent
        pointer states lie in the complement (residual sqrt(2n+1)); (iii) [D_n,D_a]=0 to
        machine precision (reproduces paper Eq.17) -> pairwise-commuting set is the whole
        space. This is the witness-free horn of the Attempt-3 dichotomy. Red-Team HIGH.
      status: reproduces
    - notebook: "3-prediction/co-admissibility-conjecture/code/coadmissibility_ratedep.py"
      result: |
        Reproduces (deterministic). Rate-DEPENDENT objects (sub-question a). DICHOTOMY:
        witness-free generator spectrum -> no pointer prediction (all non-stationary modes
        traceless; steady state = vacuum); BUT the initial purity-rate gamma_dot, via
        Feller's energy-shell Fock-stability criterion, REPRODUCES the analytic critical
        coupling g* = n0+1/2+sqrt(n0(n0+1)) to <0.2% (n0=2..6, independently verified).
        It matches einselection by ADOPTING the purity witness -> re-description. NOTE:
        an independent Red-Team REFUTED the first version's "no discrimination" conclusion
        (it used the wrong Fock-vs-coherent comparison); this is the corrected result.
      status: reproduces
    - notebook: "3-prediction/co-admissibility-conjecture/code/coadmissibility_redescription.py"
      result: |
        Reproduces (deterministic). The re-description test (closes Attempt 3's open door).
        (1) For pure states d/dt tr rho^alpha|0 = (alpha/2) gamma_dot for ALL alpha -> the
        short-time predictability sieve is WITNESS-INDEPENDENT and equals gamma_dot.
        (2) gamma_dot reproduces the analytic standard-einselection critical coupling g* to
        <0.06% (n0=2,3,4); the witness-dependence lives at FINITE time, where gamma_dot
        (the exact T->0 boundary limit) is silent. VERDICT: gamma_dot predicts nothing new
        -> RE-DESCRIPTION; PRD-001 falsifier (a) fires via its 'predicts nothing new' limb
        (NOT the 'reproduces witness-dependence' limb -- gamma_dot is witness-independent).
        Root-node red-team: correctness HIGH, scope SURVIVES with wording fixes (applied).
      status: reproduces
risk_if_false: |
  The gating task. If no formalization avoids a free measure, or every one reduces
  to the einselection optimization, BOTH physics conjectures (PRD-001, PRD-002) lose
  discriminating content and the programme collapses to re-description.
notes: |
  Root of the dependency graph. May be a computational rather than a Lean-proof object.
  Attempt 1 (2026-06-26, agent roster): a measure-free criterion C0 = ker(Lindbladian)
  exists (dissipative port of the flatness=kernel result) but degenerates to a single
  steady state in the incompatible-channel regime; re-inflating to the pointer family
  reintroduces a witness UNLESS the commutant {Lk,Lk^dag,H}' is nontrivial — and even
  then the DFS likely targets the protected, not the decohering, sector. A weaker
  pairwise-commuting-dissipator criterion (more L3-faithful) is untested. proof_status
  advanced open->prose_only (a written construction now exists); epistemic stays OPEN
  (the central measure-independence-where-it-discriminates question is unresolved — both
  Red-Team and Peer-Review declined a move to 'argued'). Decisive next artifact: the
  two-part commutant + pointer-location computation over the Feller cavity model. The
  norm the relaxation needs is the same L2-residual as the gravity quadratic horn — ties
  to OPN-002.
  Attempt 2 (2026-06-26, computation; see formal_artifacts): the decisive computation ran.
  All three tested measure-free objects are NON-DISCRIMINATING on the real model —
  commutant trivial (no DFS), pointer states in the complement, pairwise-commuting set =
  whole space (reproduces Feller Eq.17). Structural diagnosis: the tested objects are
  algebraic/rate-independent but the pointer family is rate-governed (kappa_n/kappa_a~1),
  so they cannot track it; a surviving criterion would have to be rate-dependent and
  generator-derived. SCOPE: recorded NEGATIVE for the TESTED criteria (the risk_if_false
  outcome) — progressive resolution, NOT a proof no measure-free criterion can discriminate
  (Red-Team checked the natural rate-dependent candidate, Liouvillian slow modes, which
  also fails). Labels held: proof_status prose_only, epistemic open; positive move declined.
  JD holds the final label call. Open sub-question: does any rate-dependent measure-free
  object discriminate?
  Attempt 3 (2026-06-26, sub-question (a); see formal_artifacts coadmissibility_ratedep.py):
  CORRECTED after an independent Red-Team REFUTED the first-pass "no" conclusion. Result is
  a DICHOTOMY: witness-free measure-free objects (Attempt 2 + generator spectrum) are
  non-discriminating; the purity-rate gamma_dot, via Feller's energy-shell Fock-stability
  criterion, REPRODUCES the analytic critical coupling g*=n0+1/2+sqrt(n0(n0+1)) (<0.2%,
  verified) -- but by adopting the purity witness, i.e. re-description of standard
  einselection. So the conjecture's witness-INDEPENDENT-with-novel-content target is unmet:
  witness-free is empty, witness-fixed is einselection re-described. Live falsifier is now
  PRD-001 (a) (re-description), not (b)/(c). proof_status stays prose_only; refuted DECLINED
  (the re-description horn is not yet closed). NEW open sub-question: does gamma_dot differ
  from einselection where einselection is itself witness-dependent? (the only door ajar).
  Attempt 4 (2026-06-26, the re-description test; see formal_artifacts coadmissibility_
  redescription.py): that door is now CLOSED for the gamma_dot form. gamma_dot lives at the
  short-time level where all Renyi witnesses agree (witness-independent) and there it equals
  standard einselection (g* match <0.06%); the witness-dependence lives at finite time where
  gamma_dot is silent (it is the exact T->0 boundary limit). So gamma_dot predicts NOTHING
  new -> RE-DESCRIPTION. PRD-001 falsifier (a) fires via the 'predicts nothing new' limb only.
  DECOHERENCE instantiation of OPN-001 = resolved-to-re-description; OPN-001's surviving
  discriminating value rests on the GRAVITY side (OPN-002 keystone / PRD-002). OPN-001 stays
  open/prose_only at the root (the broader measure-free design space is not impossibility-
  proved); JD's call on any status move. Recommended next: pivot discriminating effort to
  PRD-002 (caveat: it shares OPN-001 + the free-measure hazard, so this lowers its prior).
