# TRT traceability index
# The claim files in claims/ are the source of truth; generated/ is built from them.
version: "1.0.0"
schema: schemas/claim.schema.yaml
generator: scripts/build.py
prefixes:
  ONT: ontological primitives
  LOG: logical constraints
  ACT: actualization/constitution
  QM:  quantum reconstruction
  PHY: dynamics/temporal/gravity
  INT: interpretive consequences
  PRD: empirical predictions
  OPN: open problems
  EXT: imported external theorems
tiers:
  0: strategy
  1: hypothesis (hard core)
  2: theory (protective belt)
  3: prediction (severe test)
